name: Ejecutar bot fv-drive-automatico

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 21 * *"   # Día 21 de cada mes a las 17 UTC (14hs Argentina)

jobs:
  run-task:
    runs-on: ubuntu-latest

    env:
      GDRIVE_JSON: ${{ secrets.GDRIVE_JSON }}
      GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
      SMTP_TO: ${{ secrets.SMTP_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Mostrar hora actual del servidor
        run: date

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias ESTABLES
        run: |
          pip install --upgrade pip
          pip install \
            google-api-python-client==2.121.0 \
            google-auth==2.29.0 \
            google-auth-oauthlib==1.2.0 \
            google-auth-httplib2==0.2.0 \
            httplib2==0.22.0 \
            openpyxl==3.1.2

      - name: Debug secretos cargados
        run: |
          echo "📌 Verificando secretos:"
          for var in GDRIVE_JSON GMAIL_TOKEN SMTP_TO; do
            if [ -z "${!var}" ]; then
              echo "❌ Faltante: $var"
            else
              echo "✔ OK: $var"
            fi
          done

      - name: Ejecutar script
        run: python main.py

      - name: Verificar carpeta generados
        run: |
          echo "📁 Contenido de la carpeta generados/"
          if [ -d "generados" ]; then
            ls -R generados
          else
            echo "⚠ La carpeta generados no existe."
          fi

      - name: Subir excels generados
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: excels-generados
          path: generados/**
          retention-days: 15


      - name: Mostrar finalización
        run: echo "✅ Proceso finalizado correctamente."
