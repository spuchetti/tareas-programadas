name: Ejecutar bot monitoreo-liquidaciones

on:
  workflow_dispatch:   # Ejecución manual desde GitHub Actions
  schedule:
    - cron: "0 17 * * *"   # 17hs UTC = 14hs Argentina (todos los días)

jobs:
  run-task:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2 horas de margen (reparticiones pueden ser muchas)

    env:
      GDRIVE_JSON:          ${{ secrets.GDRIVE_JSON }}
      SMTP_TO_MONITOREO:    ${{ secrets.SMTP_TO_MONITOREO }}
      SMTP_FROM:            ${{ secrets.SMTP_FROM }}
      SMTP_PASSWORD:        ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Mostrar hora actual del servidor
        run: date

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install \
            google-api-python-client==2.121.0 \
            google-auth==2.29.0 \
            google-auth-oauthlib==1.2.0 \
            google-auth-httplib2==0.2.0 \
            httplib2==0.22.0 \
            openpyxl==3.1.2

      - name: Ejecutar bot de monitoreo
        run: python src/monitoreo_bot.py

      - name: Mostrar finalización
        run: echo "✅ Bot de monitoreo ejecutado."